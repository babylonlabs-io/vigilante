name: goreleaser

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  goreleaser:
    name: Create release with assets
    runs-on: ubuntu-latest
    env:
      GORELEASER_IMAGE: ghcr.io/goreleaser/goreleaser-cross:v1.27.0
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5 https://github.com/actions/setup-go/releases/tag/v5
        with:
          go-version-file: go.mod

      - name: Get CosmWasm version
        id: cosmwasm
        run: |
          echo "version=$(go list -m github.com/CosmWasm/wasmvm/v2 | sed 's/.* //')" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSMWASM_VERSION: ${{ steps.cosmwasm.outputs.version }}
        run: |
          docker run \
            --rm \
            -e GITHUB_TOKEN \
            -e COSMWASM_VERSION \
            -v "$(pwd)":/go/src/vigilante \
            -w /go/src/vigilante \
            ${{ env.GORELEASER_IMAGE }} \
            release \
            --clean
